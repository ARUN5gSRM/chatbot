{% extends 'base.html' %}
{% block title %}Upload PDF{% endblock %}
{% block content %}
<div class="container mt-5">
  <div class="card p-4 shadow-lg">
    <h3><i class="bi bi-upload"></i> Upload PDF Document</h3>
    <p class="text-muted">The document will be processed and indexed for chatbot queries.</p>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="mb-3">
        <input type="file" name="pdf" accept="application/pdf" class="form-control" required>
      </div>
      <button class="btn btn-primary"><i class="bi bi-send"></i> Upload</button>
    </form>
  </div>
</div>
{% endblock %}
