{% extends "base.html" %}
{% block title %}Register Ticket{% endblock %}
{% block content %}

<div class="container mt-5">
  <div class="card shadow-lg p-4 rounded-3">
    <h2 class="mb-3 text-primary">
      <i class="bi bi-ticket-detailed"></i> Register New Ticket
    </h2>
    <p class="text-muted mb-4">Please provide the details of your issue below.</p>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="POST" novalidate>
      {% csrf_token %}
      {{ form.as_p }}

      <div class="d-grid">
        <button type="submit" class="btn btn-primary mt-3">
          <i class="bi bi-send-fill"></i> Submit Ticket
        </button>
      </div>
    </form>
  </div>
</div>

{% endblock %}
